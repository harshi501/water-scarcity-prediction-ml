{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:"Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        body{
            min-height:100vh;
            background: url("{% static 'images/water_bg.jpg' %}") no-repeat center center/cover;
            display:flex;
            justify-content:center;
            align-items:center;
            position:relative;
        }

        /* dark overlay */
        body::before{
            content:"";
            position:absolute;
            inset:0;
            background: rgba(0,0,0,0.6);
        }

        .login-box{
            position:relative;
            z-index:2;
            width:100%;
            max-width:420px;
            padding:35px;
            border-radius:16px;
            background: rgba(255,255,255,0.10);
            backdrop-filter: blur(12px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            color:#fff;
        }

        .login-box h2{
            text-align:center;
            margin-bottom:20px;
            font-size:28px;
            letter-spacing:.5px;
        }

        .msg{
            text-align:center;
            color:#ff6b6b;
            margin-bottom:12px;
            font-weight:600;
        }

        label{
            font-weight:600;
            font-size:14px;
        }

        input[type="text"],
        input[type="password"]{
            width:100%;
            padding:12px;
            margin-top:6px;
            margin-bottom:16px;
            border:none;
            outline:none;
            border-radius:8px;
            font-size:14px;
        }

        .btn{
            width:100%;
            padding:12px;
            border:none;
            border-radius:8px;
            cursor:pointer;
            font-weight:700;
            color:#fff;
            background: linear-gradient(45deg, #00b4db, #0083b0);
            transition: 0.3s;
        }

        .btn:hover{
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(0,0,0,0.4);
        }

        .links{
            margin-top:14px;
            text-align:center;
            font-size:14px;
        }

        .links a{
            color:#00d4ff;
            text-decoration:none;
            font-weight:600;
        }

        .links a:hover{
            text-decoration:underline;
        }

        @media(max-width:500px){
            .login-box{
                margin:20px;
            }
        }
    </style>
</head>

<body>

    <div class="login-box">
        <h2>User Login</h2>

        {% if msg %}
            <div class="msg">{{ msg }}</div>
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <label>Username</label>
            <input type="text" name="t1" placeholder="Enter username" required>

            <label>Password</label>
            <input type="password" name="t2" placeholder="Enter password" required>

            <input type="submit" value="Login" class="btn">
        </form>

        <div class="links">
            <a href="{% url 'signup' %}">New user? Signup</a>
            <li><a href="{% url 'admin_login' %}" class="admin-btn">Admin Login</a></li>
        </div>
    </div>

</body>
</html>
