{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Water Scarcity Management</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            height: 100vh;
            background: url("{% static 'images/water_bg.jpg' %}") no-repeat center center/cover;
            position: relative;
        }

        /* Dark overlay */
        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.55);
            top: 0;
            left: 0;
            z-index: 0;
        }

        /* Header Layout */
        header {
            position: relative;
            z-index: 2;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 60px;
        }

        .title {
            color: #ffffff;
            font-size: 26px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        nav a {
            text-decoration: none;
            margin-left: 18px;
            padding: 10px 18px;
            border-radius: 6px;
            font-weight: 600;
            color: #fff;
            transition: 0.3s ease;
        }

        .login-btn {
            background: linear-gradient(45deg, #00b4db, #0083b0);
        }

        .signup-btn {
            background: linear-gradient(45deg, #36d1dc, #5b86e5);
        }

        .admin-btn {
            background: linear-gradient(45deg, #ff512f, #dd2476);
        }

        nav a:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }

        /* Center Welcome Text */
        .hero-text {
            position: relative;
            z-index: 2;
            height: calc(100vh - 90px);
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: #fff;
            font-size: 34px;
            font-weight: 500;
            padding: 20px;
        }

        footer {
            position: absolute;
            bottom: 10px;
            width: 100%;
            text-align: center;
            color: #ddd;
            font-size: 13px;
            z-index: 2;
        }

        /* Responsive */
        @media(max-width: 768px) {
            header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }

            nav a {
                margin: 5px;
            }

            .hero-text {
                font-size: 24px;
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="title">Water Scarcity Management using Machine Learning</div>

        <nav>
            <a href="{% url 'login' %}" class="login-btn">User Login</a>
            <a href="{% url 'signup' %}" class="signup-btn">Signup</a>
            <a href="{% url 'admin_login' %}" class="admin-btn">Admin Login</a>
        </nav>
    </header>

    <div class="hero-text">
        Smart Water Monitoring & Conservation System
    </div>

    <footer>© 2026 Water Management AI System</footer>

</body>
</html>
